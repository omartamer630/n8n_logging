<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Logger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 40px;
            max-width: 500px; width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #1a1a2e; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .recorder { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .record-btn {
            width: 120px; height: 120px; border-radius: 50%; border: none;
            background: #e74c3c; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }
        .record-btn:hover { transform: scale(1.05); }
        .record-btn.recording { background: #c0392b; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
        }
        .record-btn svg { width: 50px; height: 50px; fill: white; }
        .status { font-size: 16px; color: #333; min-height: 24px; text-align: center; }
        .transcript {
            width: 100%; min-height: 60px; padding: 15px;
            border: 2px solid #ddd; border-radius: 10px;
            font-size: 16px; text-align: center; color: #666;
            background: #f8f9fa;
        }
        .result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none; }
        .result.show { display: block; }
        .success-msg { color: #27ae60; text-align: center; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Voice Logger</h1>
        <p class="subtitle">Speak your activity</p>
        <div class="recorder">
            <button class="record-btn" id="recordBtn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <p class="status" id="status">Tap to start recording</p>
            <p class="transcript" id="transcript">Your speech will appear here...</p>
            <div class="result" id="result">
                <p class="success-msg" id="successMsg"></p>
            </div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isRecording = false;
        let recordedText = '';

        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const result = document.getElementById('result');
        const successMsg = document.getElementById('successMsg');

        // Check browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'ar-SA,en-US';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                const text = finalTranscript || interimTranscript;
                transcript.textContent = text || '...';
                recordedText = text;
            };

            recognition.onend = () => {
                isRecording = false;
                recordBtn.classList.remove('recording');
                if (recordedText.trim()) {
                    status.textContent = 'Processing...';
                    submitActivity(recordedText);
                } else {
                    status.textContent = 'Tap to start recording';
                }
            };
        }

        recordBtn.addEventListener('click', () => {
            if (!recognition) {
                status.textContent = 'Browser not supported';
                return;
            }
            recordedText = '';
            transcript.textContent = 'Listening...';
            if (!isRecording) {
                recognition.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                status.textContent = 'Listening... Speak now';
            } else {
                recognition.stop();
            }
        });

        async function submitActivity(text) {
            try {
                const response = await fetch('/api/submit-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                if (data.success) {
                    result.classList.add('show');
                    successMsg.textContent = '✓ Saved to Obsidian!';
                    transcript.textContent = 'Your speech will appear here...';
                    recordedText = '';
                    setTimeout(() => {
                        result.classList.remove('show');
                        status.textContent = 'Tap to start recording';
                    }, 3000);
                } else {
                    status.textContent = 'Error: ' + (data.error || 'Failed');
                }
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
