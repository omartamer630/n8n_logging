upstream voice_app {
    server voice-app:5000;
}

upstream n8n {
    server n8n:5678;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;   # allow audio uploads up to 25 MB

    # ── Web app (voice recorder UI) ──────────────────────────────────
    location / {
        proxy_pass         http://voice_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── n8n webhook endpoint ─────────────────────────────────────────
    location /webhook/ {
        proxy_pass         http://n8n;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── n8n UI (optional, only if you want it at /n8n/) ──────────────
    location /n8n/ {
        proxy_pass         http://n8n/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
